version: "3.9"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4 --threads 2
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
    restart: always
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G

  nginx:
    profiles: []  # toujours actif en prod
