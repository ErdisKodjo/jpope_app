{% load static %}
<!-- Header -->
<header class="header d-flex flex-row">
    <div class="header_content d-flex flex-row align-items-center">

        <!-- Logo -->
        <div class="logo_container">
            <a href="{% url 'accounts:home' %}" style="text-decoration:none;">
                <div class="logo">
                    <img src="{% static 'images/logo.png' %}" alt="AvenSU-Orienta">
                    <span>AvenSU</span>
                </div>
            </a>
        </div>

        <!-- Main Navigation -->
        <nav class="main_nav_container">
            <div class="main_nav">
                <ul class="main_nav_list">
                    <li class="main_nav_item"><a href="{% url 'accounts:home' %}">Accueil</a></li>
                    <li class="main_nav_item"><a href="{% url 'catalog:etablissement-list' %}">Établissements</a></li>
                    <li class="main_nav_item"><a href="{% url 'catalog:formation-list' %}">Formations</a></li>
                    <li class="main_nav_item"><a href="{% url 'events:event-list' %}">Événements</a></li>
                    <li class="main_nav_item"><a href="{% url 'community:forum-list' %}">Communauté</a></li>
                    <li class="main_nav_item"><a href="#">Contact</a></li>
                </ul>
            </div>
        </nav>

    </div>

    <!-- Auth / Phone -->
    <div class="header_side d-flex flex-row justify-content-center align-items-center">
        {% if user.is_authenticated %}
            <div class="dropdown">
                <a class="dropdown-toggle" href="#" role="button" id="userDropdown" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false" style="color: inherit; text-decoration: none;">
                    <i class="fas fa-user-circle mr-1"></i>
                    {{ user.get_full_name|default:user.email }}
                </a>
                <div class="dropdown-menu dropdown-menu-right" aria-labelledby="userDropdown">
                    <a class="dropdown-item" href="{% url 'accounts:profile' %}"><i class="fas fa-user mr-2"></i>Mon profil</a>
                    <a class="dropdown-item" href="{% url 'dashboard:home' %}"><i class="fas fa-tachometer-alt mr-2"></i>Tableau de bord</a>
                    <div class="dropdown-divider"></div>
                    <a class="dropdown-item" href="{% url 'accounts:logout' %}"><i class="fas fa-sign-out-alt mr-2"></i>Déconnexion</a>
                </div>
            </div>
        {% else %}
            <a href="{% url 'accounts:login' %}" class="btn btn-sm btn-outline-light mr-2">Connexion</a>
            <a href="{% url 'accounts:register' %}" class="btn btn-sm btn-primary">S'inscrire</a>
        {% endif %}
    </div>

    <!-- Hamburger -->
    <div class="hamburger_container">
        <i class="fas fa-bars trans_200"></i>
    </div>

</header>
