version: "3.9"

services:
  # ──────────── Base de données ────────────
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-avensu}
      POSTGRES_USER: ${POSTGRES_USER:-avensu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-avensu}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-avensu}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────── Redis ────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────── Application Django ────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ──────────── Celery Worker ────────────
  celery:
    build: .
    command: celery -A config worker -l info -Q default,chatbot,notifications,analytics
    volumes:
      - .:/app
    env_file: .env
    depends_on:
      - db
      - redis

  # ──────────── Celery Beat ────────────
  celery-beat:
    build: .
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
    env_file: .env
    depends_on:
      - db
      - redis

  # ──────────── Flower (monitoring Celery) ────────────
  flower:
    build: .
    command: celery -A config flower --port=5555
    ports:
      - "5555:5555"
    env_file: .env
    depends_on:
      - redis

  # ──────────── Ollama (IA locale) ────────────
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - ai

  # ──────────── Nginx (reverse proxy, optionnel en dev) ────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      - web
    profiles:
      - prod

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:
  ollama_data:
